{% extends 'admin/baseadmin.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center py-5 ">
    <div class="content-wrapper  w-100 br-5">
        <h1>Campain</h1>
        <h6 class="text-danger" id="err">{% for i in messages %}{{i}}{% endfor %}</h6>

    <form action="{% url 'edit_campain' data.id %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row">

            <div class="col-sm-6">
                <div class="form-group">
            <label for="name"> Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Campain Name" value="{{data.name}}" required>
        </div>
            </div>

            <div class="col-sm-6">
                <div class="form-group">
            <label for="place">Place</label>
            <input type="text" class="form-control" id="place" name="place" placeholder="Place" value="{{data.place}}" required>
        </div>

            </div>
        </div>

        <div class="row">

            <div class="col-sm-6">
                <div class="form-group">
            <label for="date"> Date</label>
            <input type="date" class="form-control" id="date" name="date" placeholder="Date" value="{{data.date|date:'Y-m-d'}}" required>
        </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
            <label for="time">Time</label>
            <input type="time" class="form-control" id="time" name="time" placeholder="Time" value="{{data.time|time:'H:i'}}" required>
        </div>
            </div>
        </div>



        
        
        
        
        <div class="form-group">
            <label for="agent">Agent</label>
            <select name="agent" id="agent" class="form-control">
                {% for i in agent %}
                <option value="{{i.id}}" {% if i.id == data.agent.id %}selected{% endif %}>{{i.user.username}}</option>
                {% endfor %}
            </select>
        </div>
       
        <div class="form-group">
            <label for="image">Image </label>
            <input type="file" class="form-control" accept="image/*" id="image" name="image">
        </div>

        <input type="submit" class="form-control btn btn-info">


        </div>
    </form>
    </div>
    
{% endblock %}
