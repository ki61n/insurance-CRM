<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<h6 class="text-danger" id="err">{% for i in messages %}{{i}}{% endfor %}</h6>

<div class="">
    <form action="{% url 'reg_agents' %}" method="post" enctype="multipart/form-data" onsubmit="return val(event)">
        {% csrf_token %}
        <div class="form-group">
            <label for="fname">First Name</label>
            <input type="text" class="form-control" id="fname" name="fname">
        </div>
        <div class="form-group">
            <label for="lname">Last Name</label>
            <input type="text" class="form-control" id="lname" name="lname">
        </div>
        <div class="form-group">
            <label for="uname">Username</label>
            <input type="text" class="form-control" id="uname" name="uname">
            <small id="unameerror" class="form-text text-danger">{{unameerror}}</small>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" class="form-control" id="email" name="email">
            <small id="emailerror" class="form-text text-danger">{{emailerror}}</small>
        </div>
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" class="form-control" id="phone" name="phone">
            <small id="phoneerror" class="form-text text-danger">{{phoneerror}}</small>
        </div>
        <div class="form-group">
            <label for="address">Address </label>
            <input type="text" class="form-control" id="address" name="address">
        </div>
        <div class="form-group">
            <label for="profile">Profile </label>
            <input type="file" class="form-control" accept="image/*" id="profile" name="profile">
        </div>

        <input type="submit" class="form-control btn btn-info">


        </div>
    </form>
</div>

<script>
     function val(e){
            email=document.getElementById("email").value
            contact=document.getElementById("phone").value
            err=document.getElementById('err')
            if (err) {
                err.innerHTML="";
            }
            emailpattern = /^[^\s@]+@gmail\.[^\s@]+$/;

            // emailpattern=/^[^\s@]+@[^gmail\.com]+$/;
            phonepattern=/^[6-9][0-9]{9}$/;

            if (! emailpattern.test(email)){
                err.innerHTML="invalid email address"
                return false;

            }
            else if (contact && !phonepattern.test(contact)){
                err.innerHTML="Phone number must contan 10 digits and starts with 6-9"
                return false;
            }
            else{
                err.innerHTML="";
                return true;
            }

        }


    $(document).ready(function(){
        $("#uname").on('keyup',function(){

            checkuname()
        })

    $("#email").keyup(function(){

            checkemail()
    })

    $("#phone").keyup(function(){

        checkphone()
    })
})

function checkuname(){
    var uname = $("#uname").val()
    if (uname.length ==0){
        $('#unameerror').text('')
        return
    }
    $.ajax({
        type:'GET',
        url:"{% url 'checkuname' %}?username="+uname,
        success:function(response){
            if (response.user ){
                $('#unameerror').text('username alredy exist')
            }else{
                $('#unameerror').text('')

            }


    }})
}


function checkemail(){
    email=$('#email').val()
    if (email.length==0){
        $('#emailerror').text('')
        return
    }
    $.ajax({
        type:'GET',
        url:"{% url 'chackmail' %}?email="+email,
        success:function(response){
            if(response.user){
                $('#emailerror').text('email alredy exist')
                
            }else{
                $('#emailerror').text('')
            }
        }
    })
}



function checkphone(){
    phone=$('#phone').val()
    if (phone.length==0){
        $('#phoneerror').text('')
        return
    }
    $.ajax({
        type:'GET',
        url:"{% url 'chackphone' %}?phone="+phone,
        success:function(response){
            if(response.user){
                $('#phoneerror').text('phone number alredy exist')
                
            }else{
                $('#phoneerror').text('')
            }
        }
    })
}
    
</script>
